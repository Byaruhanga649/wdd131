<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Uganda Country Page</title>

    <meta name="description" content="A country page about Uganda including information, weather, and attractions.">
    <meta name="author" content="Byaruhanga Arthur">

    <link rel="stylesheet" href="styles/place.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Uganda</h1>
    </header>


    <main>

        <section class="hero">

            <picture>
                <source media="(max-width: 600px)" srcset="images/uganda-small.webp">
                <img src="images/uganda-large.webp" alt="Beautiful landscape view of Uganda with green hills and nature"
                    loading="lazy">
            </picture>

        </section>


        <section class="card data">

            <h2>Data</h2>

            <p><strong>Area:</strong> 241,038 km²</p>
            <p><strong>Population:</strong> About 49 million</p>
            <p><strong>Capital:</strong> Kampala</p>
            <p><strong>Language:</strong> English, Luganda</p>
            <p><strong>Currency:</strong> Ugandan Shilling</p>
            <p><strong>Time Zone:</strong> UTC+3</p>

        </section>



        <section class="card weather">

            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather icon" width="60" height="60">

            <p>Temperature: <span id="temperature">8</span>°C</p>

            <p>Wind Speed: <span id="wind">10</span> km/h</p>

            <p>Wind Chill:
                <span id="windchill"></span>
            </p>

        </section>


    </main>



    <footer>

        <p>
            © <span id="year"></span> 🌍 Byaruhanga Arthur | Uganda
        </p>

        <p>
            Last Modified: <span id="modified"></span>
        </p>

    </footer>


</body>

</html>
